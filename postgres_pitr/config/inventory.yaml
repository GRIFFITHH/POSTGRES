targets:
  - name: pitr-sample-direct
    connector: direct_tcp
    db_host: 127.0.0.1
    db_port: 5432
    db_name: postgres
    db_user: postgres
    secret_ref: env:PG_PITR_SAMPLE_PASSWORD
    backup:
      basebackup_path: /backup/postgres/base
      wal_archive_path: /backup/postgres/wal
      retention_days: 7

  - name: pitr-sample-bastion
    connector: ssh_bastion_tunnel
    bastion_host: 10.0.0.10
    bastion_user: ec2-user
    # ssh_key_path: /path/to/key.pem
    db_host: 172.31.0.15
    db_port: 5432
    db_name: postgres
    db_user: postgres
    secret_ref: env:PG_PITR_SAMPLE_BASTION_PASSWORD
    backup:
      basebackup_path: /backup/postgres/base
      wal_archive_path: /backup/postgres/wal
      retention_days: 7
